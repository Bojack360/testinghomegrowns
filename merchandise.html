<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="merchandise.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Merchandise</title>
</head>

<body>
    <header>
        <div class="logo">
            <img src="assets/images/Logo.png" alt="Le Café Potager Logo">
        </div>
        <nav>
            <ul id="nav-list">
                <li><a href="index.html">ABOUT US</a></li>
                <li><a href="event.html">EVENTS</a></li>
                <li><a href="merchandise.html">MERCHANDISE</a></li>
                <li><a href="newsfeed.html">NEWS FEED</a></li>
                <li><a href="login.html" class="btn-account">LOG IN</a></li>
                <button class="butones" onclick="shoppingCart()">
                    <a id="showcart" href="#" class="cart" style="text-decoration: none;">
                        <img src="assets/images/shoppingcart1.png" alt="cart" width="40" height="40" style="display:block;">
                        <span id="countercart" class="cartcounter">0</span>
                    </a>
                </button>
            </ul>
        </nav>
    </header>
    
    <!-- Dynamic Product Grid - Products will be loaded from localStorage -->
    <div class="apatkabayo" id="product-grid">
        <!-- Products will be rendered here by JavaScript -->
    </div>
    
    <div id="cartcart" class="shoppingcart">
        <div class="cartclass">
            <div class="cartheader">
                <h2>Shopping Cart</h2>
                <span class="close" onclick="shoppingCart()">&times;</span>
            </div>

            <div class="cartbody">
                <div id="cartItems">
                    <p style="text-align:center; color:#ccc;">Your cart is empty.</p>
                </div>
                <div class="total">
                    <h3>Total: <span id="cartTotal">₱0</span></h3>
                </div>
                <div class="form">
                    <h3>Pickup Details</h3>
                    <input type="email" id="custEmail" placeholder="Email Address" required>
                    <input type="tel" id="custPhone" placeholder="Phone Number" required>
                    <textarea id="custDesc" rows="3"
                        placeholder="Pickup Description"></textarea>
                </div>
            </div>

            <div class="cartfooter">
                <button class="checkout" onclick="showConfirmation()">Checkout</button>
            </div>
        </div>
    </div>
    <div id="confirmModal" class="shoppingcart">
        <div class="cartclass content">
            <h2>Confirm Pre-Order</h2>
            <div id="summary"></div>
            <div class="btnfooter">
                <button class="cancel" onclick="closeConfirmation()">Back</button>
                <button class="confirm" onclick="finalizeOrder()">Confirm Pre-Order</button>
            </div>
        </div>
    </div>
    <footer>
        <a><img src="assets/images/fblogo.png" alt="facebooklogo1" width="30" height="25"></a>
        <a><img src="assets/images/iglogo.png" alt="iglogo" width="30" height="25"></a>
    </footer>
    <script type="module" src="merch.js"></script>
</body>

</html>
