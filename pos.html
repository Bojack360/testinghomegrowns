<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - The Homegrowns</title>
    <link rel="stylesheet" href="pos.css">
</head>
<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo">
                <img src="assets/images/Logo.png" alt="Logo" width="100" height="100">
            </div>
            <ul>
                <a href="merchadmin.html"><li>Merchandise</li></a>
                <a href="eventadmin.html"><li>Events</li></a>
                <a href="newsfeedadmin.html"><li>Newsfeed</li></a>
                <a href="pos.html"><li>POS</li></a>
                <a href="reports.html"><li>Reports</li></a>
                <button class="butones" onclick="logout()"><li>Logout</li></button>
            </ul>
        </div>
    </nav>

    <div class="pos-container">
        <!-- Products Panel -->
        <div class="pos-products">
            <div class="products-header">
                <h2>Products</h2>
                <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
            </div>
            <div class="products-grid" id="productsGrid">
                <p class="loading-msg">Loading products...</p>
            </div>
        </div>

        <!-- Cart Panel -->
        <div class="pos-cart">
            <div class="cart-header">
                <h2>Current Order</h2>
                <button class="btn-clear" id="clearCartBtn">Clear</button>
            </div>

            <div class="cart-items" id="cartItems">
                <p class="cart-empty">No items added yet.</p>
            </div>

            <div class="cart-footer">
                <div class="cart-total-row">
                    <span>Total</span>
                    <span id="cartTotal">&#8369;0.00</span>
                </div>

                <div class="payment-section">
                    <label class="section-label">Payment Method</label>
                    <div class="payment-btns" id="paymentBtns">
                        <button class="pay-btn active" data-method="Cash">Cash</button>
                        <button class="pay-btn" data-method="Card">Card</button>
                        <button class="pay-btn" data-method="GCash">GCash</button>
                        <button class="pay-btn" data-method="Maya">Maya</button>
                    </div>
                </div>

                <div class="cash-section" id="cashSection">
                    <label class="section-label">Cash Received</label>
                    <input type="number" id="cashReceived" class="cash-input" placeholder="0.00" min="0" step="0.01">
                    <div class="change-row">
                        <span>Change</span>
                        <span id="changeAmount">&#8369;0.00</span>
                    </div>
                </div>

                <button class="btn-process" id="processBtn">Process Sale</button>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-content">
            <h2 class="modal-title">&#10003; Sale Complete</h2>
            <div id="receiptBody"></div>
            <div class="modal-actions">
                <button class="btn-confirm" id="newTxnBtn">New Transaction</button>
            </div>
        </div>
    </div>

    <script type="module" src="pos.js"></script>
</body>
</html>
