<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - The Homegrowns</title>
    <link rel="stylesheet" href="pos.css">
</head>
<body>
    <nav class="navbar">
        <div class="navdiv">
            <div class="logo">
                <img src="assets/images/Logo.png" alt="Logo" width="100" height="100">
            </div>
            <ul>
                <a href="merchadmin.html"><li>Merchandise</li></a>
                <a href="eventadmin.html"><li>Events</li></a>
                <a href="newsfeedadmin.html"><li>Newsfeed</li></a>
                <a href="pos.html"><li>POS</li></a>
                <a href="reports.html"><li>Reports</li></a>
                <button class="butones" onclick="logout()"><li>Logout</li></button>
            </ul>
        </div>
    </nav>

    <div class="pos-container">
        <!-- Products Panel -->
        <div class="pos-products">
            <div class="products-header">
                <h2>Products</h2>
                <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
            </div>
            <div class="category-tabs">
                <button class="cat-btn active" data-cat="merchandise">Merchandise</button>
                <button class="cat-btn" data-cat="coffee">Coffee</button>
            </div>
            <div class="products-grid" id="productsGrid">
                <p class="loading-msg">Loading products...</p>
            </div>
        </div>

        <!-- Cart Panel -->
        <div class="pos-cart">
            <div class="cart-header">
                <h2>Current Order</h2>
                <button class="btn-clear" id="clearCartBtn">Clear</button>
            </div>

            <div class="cart-items" id="cartItems">
                <p class="cart-empty">No items added yet.</p>
            </div>

            <div class="cart-footer">
                <div class="discount-section" id="discountSection" style="display:none;">
                    <span class="discount-label">Discount</span>
                    <div class="discount-controls">
                        <button class="disc-type-btn active" id="discTypePct">%</button>
                        <button class="disc-type-btn" id="discTypeFixed">&#8369;</button>
                        <input type="number" id="discountInput" class="discount-input" min="0" placeholder="0">
                    </div>
                </div>
                <div class="subtotal-row" id="subtotalRow" style="display:none;">
                    <span>Subtotal</span>
                    <span id="subtotalAmount">&#8369;0.00</span>
                </div>
                <div class="discount-amount-row" id="discountLine" style="display:none;">
                    <span>Discount</span>
                    <span id="discountAmount" class="discount-value">-&#8369;0.00</span>
                </div>
                <div class="cart-total-row">
                    <span>Total</span>
                    <span id="cartTotal">&#8369;0.00</span>
                </div>

                <button class="btn-process" id="processBtn">Process Sale</button>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-content">
            <h2 class="modal-title">&#10003; Sale Complete</h2>
            <div id="receiptBody"></div>
            <div class="modal-actions">
                <button class="btn-confirm" id="newTxnBtn">New Transaction</button>
            </div>
        </div>
    </div>

    <script type="module" src="pos.js"></script>
</body>
</html>
