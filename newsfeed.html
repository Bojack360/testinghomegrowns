<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed - The Homegrowns</title>
    <link rel="stylesheet" href="newsfeed.css">
    <link rel="stylesheet" href="animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">
            <img src="assets/images/Logo.png" alt="The Homegrowns Logo">
        </div>
        <nav>
            <ul id="nav-list">
                <li><a href="index.html#about">About Us</a></li>
                <li><a href="event.html">Events</a></li>
                <li><a href="merchandise.html">Merchandise</a></li>
                <li><a href="newsfeed.html">News Feed</a></li>
                <li><a href="login.html" class="btn-account">Log-in</a></li>
            </ul>
        </nav>
        <button class="mobile-menu-btn" onclick="toggleMenu()">&#9776;</button>
    </header>

    <main class="feed-main">
        <div class="feed-list" id="feedList">
            <p class="loading-text">Loading posts...</p>
        </div>
    </main>

    <!-- Reaction Picker (shared, repositioned per post) -->
    <div id="reactionPicker" class="reaction-picker" style="display:none;">
        <div class="picker-inner" id="pickerInner">
            <p class="picker-empty">No reactions available yet.</p>
        </div>
    </div>

    <footer>
        <a href="https://www.facebook.com/TheHomegrowns5000" target="_blank"><img src="assets/images/fblogo.png" alt="Facebook"></a>
        <a href="https://www.instagram.com/thehomegrowns.50h/" target="_blank"><img src="assets/images/iglogo.png" alt="Instagram"></a>
    </footer>

    <script type="module" src="newsfeed.js"></script>
</body>
</html>
